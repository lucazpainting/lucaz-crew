<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#18181B}
body{font-family:"Sora",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#18181B}
input,select,button{font-family:"Sora",-apple-system,sans-serif}
button{-webkit-tap-highlight-color:transparent;cursor:pointer}
::-webkit-scrollbar{display:none}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pp{0%{transform:scale(.94)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
.fi{animation:fi .2s ease both}
.pp{animation:pp .18s ease both}
.dt{
  width:38px;height:38px;border-radius:10px;
  border:2px solid #E4DDD5;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
  flex-shrink:0;position:relative;background:#fff;
  -webkit-tap-highlight-color:transparent;
}
.dt:active{transform:scale(.88)}
.dt.on{
  background:linear-gradient(135deg,#8B1A1A,#A52222);
  border-color:transparent;
  box-shadow:0 4px 14px rgba(139,26,26,.25);
}
.dt.td{border-color:#F59E0B}
.dt.on.td{border-color:transparent}
.dt.half{background:linear-gradient(135deg,#A06010,#B45309)!important;border-color:transparent!important;box-shadow:0 4px 14px rgba(160,96,16,.25)!important;}
.nb{
  width:100%;display:flex;align-items:center;
  border:none;border-radius:10px;cursor:pointer;
  transition:background .14s;white-space:nowrap;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.nb.no{background:#8B1A1A!important;color:#fff!important}
.tg{-webkit-tap-highlight-color:transparent}
.tg:active{background:rgba(255,255,255,.12)!important}
.cc{cursor:pointer;-webkit-tap-highlight-color:transparent}
.cc:active:not(.cb){opacity:.75}
.rp{-webkit-tap-highlight-color:transparent}
.rp:active{opacity:.8;transform:scale(.97)}
</style>
</head>

/* date helpers */
const pad=n=>String(n).padStart(2,"0");
const toISO=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayISO=()=>toISO(new Date());
const parseISO=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
function weekMon(off=0){
  const d=new Date(),day=d.getDay();
  d.setDate(d.getDate()-(day===0?6:day-1)+off*7);d.setHours(0,0,0,0);return d;
}
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MFULL=["January","February","March","April","May","June","July","August","September","October","November","December"];
const WDAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const CDAYS=["S","M","T","W","T","F","S"];
function fmtWk(mon){
  const sun=addDays(mon,6);
  return mon.getMonth()===sun.getMonth()
    ?`${MONS[mon.getMonth()]} ${mon.getDate()}–${sun.getDate()}, ${sun.getFullYear()}`
    :`${MONS[mon.getMonth()]} ${mon.getDate()} – ${MONS[sun.getMonth()]} ${sun.getDate()}, ${sun.getFullYear()}`;
}
const f$=n=>"$"+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const fD=iso=>{const[,m,d]=iso.split("-");return`${MONS[+m-1]} ${+d}`};

/* seed */
const SE=[{id:1,name:"Carlos M.",role:"Painter",rate:200},{id:2,name:"Luis R.",role:"Carpenter",rate:220}];
const SJ=["Ossining Deck Job","White Plains Interior"];
const NAV=[{k:"week",i:"clp",l:"Week"},{k:"cal",i:"cal",l:"Calendar"},{k:"crew",i:"usr",l:"Crew"},{k:"jobs",i:"bld",l:"Jobs"}];

/* ── APP ── */
function App(){
  // localStorage persistence — data survives app restarts
  function lsGet(key, fallback) {
    try { const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; } catch{ return fallback; }
  }
  function lsSet(key,val){ try{localStorage.setItem(key,JSON.stringify(val));}catch{} }

  const [emps,setEmpsRaw]=useState(()=>lsGet("lz_emps",SE));
  const [jobs,setJobsRaw]=useState(()=>lsGet("lz_jobs",SJ));
  const [logs,setLogsRaw]=useState(()=>lsGet("lz_logs",[]));
  const [advs,setAdvsRaw]=useState(()=>lsGet("lz_advs",[]));

  function setEmps(fn){ setEmpsRaw(p=>{const v=typeof fn==="function"?fn(p):fn;lsSet("lz_emps",v);return v;}); }
  function setJobs(fn){ setJobsRaw(p=>{const v=typeof fn==="function"?fn(p):fn;lsSet("lz_jobs",v);return v;}); }
  function setLogs(fn){ setLogsRaw(p=>{const v=typeof fn==="function"?fn(p):fn;lsSet("lz_logs",v);return v;}); }
  function setAdvs(fn){ setAdvsRaw(p=>{const v=typeof fn==="function"?fn(p):fn;lsSet("lz_advs",v);return v;}); }
  const [tab,setTab]=useState("week");
  const [modal,setModal]=useState(null);
  const [wkOff,setWkOff]=useState(0);
  const [aJob,setAJob]=useState(SJ[0]);
  const now=new Date();
  const [calY,setCalY]=useState(now.getFullYear());
  const [calM,setCalM]=useState(now.getMonth());
  const [calSel,setCalSel]=useState(null);
  const [fEmp,setFEmp]=useState({name:"",role:"",rate:""});
  const [fEdit,setFEdit]=useState(null);
  const [fJob,setFJob]=useState("");
  const [fAdv,setFAdv]=useState({empId:"",amount:"",date:todayISO(),note:""});

  const TODAY=todayISO();
  const mon=weekMon(wkOff);
  const wkDays=Array.from({length:7},(_,i)=>addDays(mon,i));
  const sun=wkDays[6];

  const wkLogs=logs.filter(l=>{const d=parseISO(l.date);return d>=mon&&d<=sun});
  const getLog=(eid,iso)=>wkLogs.find(l=>l.empId===eid&&l.date===iso&&l.job===aJob);
  const isOn=(eid,iso)=>!!getLog(eid,iso);

  // Cycle: empty → full day (1) → half day (0.5) → empty
  function toggle(eid,iso){
    const existing=getLog(eid,iso);
    if(!existing){
      // empty → full day
      setLogs(p=>[...p,{id:Date.now(),empId:eid,date:iso,job:aJob,paid:false,days:1}]);
    } else if(existing.days===1){
      // full → half
      setLogs(p=>p.map(l=>l.id===existing.id?{...l,days:0.5}:l));
    } else {
      // half → empty
      setLogs(p=>p.filter(l=>l.id!==existing.id));
    }
  }

  const rt=id=>emps.find(e=>e.id===id)?.rate??0;
  const wPay=id=>wkLogs.filter(l=>l.empId===id).reduce((s,l)=>s+(l.days||1)*rt(id),0);
  const wOwe=id=>wkLogs.filter(l=>l.empId===id&&!l.paid).reduce((s,l)=>s+(l.days||1)*rt(id),0);
  const advBal=id=>advs.filter(a=>a.empId===id&&!a.settled).reduce((s,a)=>s+Number(a.amount),0);
  const netOwe=id=>Math.max(0,wOwe(id)-advBal(id));

  function markPaid(eid){
    const ids=wkLogs.filter(l=>l.empId===eid&&!l.paid).map(l=>l.id);
    if(!ids.length)return;
    let rem=wOwe(eid);const ts=[];
    for(const a of advs.filter(x=>x.empId===eid&&!x.settled)){if(rem<=0)break;const amt=Number(a.amount);if(amt<=rem){ts.push(a.id);rem-=amt;}}
    setLogs(p=>p.map(l=>ids.includes(l.id)?{...l,paid:true}:l));
    setAdvs(p=>p.map(a=>ts.includes(a.id)?{...a,settled:true}:a));
  }
  function markAll(){emps.forEach(e=>markPaid(e.id))}

  const wkTot=wkLogs.reduce((s,l)=>s+(l.days||1)*rt(l.empId),0);
  const wkOwd=wkLogs.filter(l=>!l.paid).reduce((s,l)=>s+(l.days||1)*rt(l.empId),0);

  function addEmp(){if(!fEmp.name.trim()||!fEmp.rate)return;setEmps(p=>[...p,{id:Date.now(),name:fEmp.name.trim(),role:fEmp.role.trim(),rate:+fEmp.rate}]);setFEmp({name:"",role:"",rate:""});setModal(null)}
  function saveEmp(){setEmps(p=>p.map(e=>e.id===fEdit.id?{...fEdit,rate:+fEdit.rate}:e));setModal(null);setFEdit(null)}
  function delEmp(id){if(!confirm("Remove employee?"))return;setEmps(p=>p.filter(e=>e.id!==id));setLogs(p=>p.filter(l=>l.empId!==id));setAdvs(p=>p.filter(a=>a.empId!==id))}
  function addJob(){const t=fJob.trim();if(!t||jobs.includes(t))return;setJobs(p=>[...p,t]);setAJob(t);setFJob("");setModal(null)}
  function delJob(n){if(!confirm(`Remove "${n}"?`))return;setJobs(p=>p.filter(j=>j!==n));setLogs(p=>p.filter(l=>l.job!==n));if(aJob===n)setAJob(jobs.find(j=>j!==n)||"")}
  function addAdv(){const amt=+fAdv.amount;if(!fAdv.empId||!amt||amt<=0)return;setAdvs(p=>[...p,{id:Date.now(),empId:+fAdv.empId,amount:amt,date:fAdv.date,note:fAdv.note,settled:false}]);setFAdv({empId:"",amount:"",date:todayISO(),note:""});setModal(null)}

  function empSt(emp){const el=logs.filter(l=>l.empId===emp.id),e=el.reduce((s,l)=>s+(l.days||1)*emp.rate,0),p=el.filter(l=>l.paid).reduce((s,l)=>s+(l.days||1)*emp.rate,0);return{days:el.reduce((s,l)=>s+(l.days||1),0),earned:e,paid:p,owed:e-p,adv:advBal(emp.id)}}
  const jobSt=jobs.map(j=>{const jl=logs.filter(l=>l.job===j),c=jl.reduce((s,l)=>s+(l.days||1)*rt(l.empId),0),p=jl.filter(l=>l.paid).reduce((s,l)=>s+(l.days||1)*rt(l.empId),0);return{name:j,days:jl.reduce((s,l)=>s+(l.days||1),0),cost:c,paid:p,owed:c-p}});
  const calDim=(y,m)=>new Date(y,m+1,0).getDate();
  const calFd=(y,m)=>new Date(y,m,1).getDay();
  const calLogs=iso=>logs.filter(l=>l.date===iso);
  const isoDay=d=>`${calY}-${pad(calM+1)}-${pad(d)}`;
  function buildCal(){const dim=calDim(calY,calM),fd=calFd(calY,calM),c=[];for(let i=0;i<fd;i++)c.push(null);for(let d=1;d<=dim;d++)c.push(d);while(c.length%7!==0)c.push(null);return c}
  function mthStats(){const dim=calDim(calY,calM),ml=[];for(let d=1;d<=dim;d++)ml.push(...calLogs(isoDay(d)));const tot=ml.reduce((s,l)=>s+(l.days||1)*rt(l.empId),0),paid=ml.filter(l=>l.paid).reduce((s,l)=>s+(l.days||1)*rt(l.empId),0);return{tot,paid,owed:tot-paid,days:ml.reduce((s,l)=>s+(l.days||1),0)}}

  const GRDCOLS="138px repeat(7,minmax(42px,1fr)) 100px";
  const PAD="14px 14px 90px";

  return <>
    {/* TOP HEADER */}
    <div style={{background:DK,paddingTop:"env(safe-area-inset-top)",position:"fixed",top:0,left:0,right:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px"}}>
        <img src={LOGO} alt="LUCAZ" style={{height:30,width:"auto"}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:"#fff",lineHeight:1}}>LUCAZ LLC</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".1em"}}>Crew Tracker</div>
        </div>
        <button className="tg" onClick={()=>setModal("addEmp")} style={{background:R,border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="usr" sz={15} c="#fff"/></button>
        <button className="tg" onClick={()=>setModal("addJob")} style={{background:DK2,border:`1px solid ${DK3}`,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="pls" sz={15} c="rgba(255,255,255,.6)"/></button>
      </div>
    </div>

    {/* SCROLL AREA */}
    <div style={{overflowY:"auto",WebkitOverflowScrolling:"touch",background:BG,paddingTop:"calc(env(safe-area-inset-top) + 52px)",height:"100vh"}}>

      {/* ═══ WEEK ══════════════════════════════════════════════════ */}
      {tab==="week" && <div className="fi" style={{padding:PAD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:14,gap:8}}>
          <div>
            <div style={{fontSize:9,fontWeight:600,color:GR2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:3}}>Timesheet</div>
            <h1 style={{fontSize:17,fontWeight:800,lineHeight:1.1}}>{fmtWk(mon)}</h1>
          </div>
          <div style={{display:"flex",gap:5}}>
            {wkOff!==0&&<button className="rp" onClick={()=>setWkOff(0)} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,padding:"0 10px",height:30,fontSize:11,fontWeight:600,color:R}}>Today</button>}
            <button className="rp" onClick={()=>setWkOff(w=>w-1)} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:GR}}><Ic n="chL" sz={13}/></button>
            <button className="rp" onClick={()=>setWkOff(w=>w+1)} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:GR}}><Ic n="chR" sz={13}/></button>
          </div>
        </div>

        {/* Job selector */}
        <div style={{background:WH,borderRadius:11,border:`1px solid ${BD}`,padding:"9px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <span style={{fontSize:9,fontWeight:700,color:GR2,textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap"}}>Job</span>
          {jobs.map(j=><button key={j} className="rp" onClick={()=>setAJob(j)} style={{border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:600,background:aJob===j?R:BG,color:aJob===j?"#fff":GR,boxShadow:aJob===j?`0 2px 8px ${RG}`:"none"}}>{j}</button>)}
          <button className="rp" onClick={()=>setModal("addJob")} style={{background:"none",border:`1.5px dashed ${BD}`,borderRadius:7,padding:"4px 10px",fontSize:10,color:GR2,display:"flex",alignItems:"center",gap:3}}><Ic n="pls" sz={10} c={GR2}/>New</button>
        </div>

        {/* Grid */}
        {emps.length===0
          ? <div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,padding:40,textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,marginBottom:10}}>No crew yet</div><PB onClick={()=>setModal("addEmp")}>Add First Employee</PB></div>
          : <>
            <div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,overflow:"auto",WebkitOverflowScrolling:"touch",marginBottom:12}}>
              <div style={{minWidth:540}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:GRDCOLS,background:BG2,borderBottom:`1px solid ${BD}`}}>
                  <div style={{padding:"8px 12px",fontSize:9,fontWeight:700,color:GR2,textTransform:"uppercase",letterSpacing:".06em"}}>Employee</div>
                  {wkDays.map((d,i)=>{const iso=toISO(d),isT=iso===TODAY;return(
                    <div key={i} style={{padding:"7px 2px",textAlign:"center",borderLeft:`1px solid ${BD}`}}>
                      <div style={{fontSize:8,fontWeight:700,textTransform:"uppercase",color:isT?R:GR2}}>{WDAYS[i]}</div>
                      <div style={{fontSize:15,fontWeight:isT?800:400,color:isT?R:DK,marginTop:1}}>{d.getDate()}</div>
                      {isT&&<div style={{width:4,height:4,borderRadius:"50%",background:R,margin:"2px auto 0"}}/>}
                    </div>
                  )})}
                  <div style={{padding:"8px 10px",fontSize:9,fontWeight:700,color:GR2,textTransform:"uppercase",textAlign:"right",borderLeft:`1px solid ${BD}`}}>Pay</div>
                </div>

                {/* Rows */}
                {emps.map((emp,ei)=>{
                  const wp=wPay(emp.id),wo=wOwe(emp.id),ab=advBal(emp.id),days=wkLogs.filter(l=>l.empId===emp.id).reduce((s,l)=>s+(l.days||1),0);
                  return <div key={emp.id} style={{display:"grid",gridTemplateColumns:GRDCOLS,borderBottom:ei<emps.length-1?`1px solid ${BD}`:"none",alignItems:"center"}}>
                    <div style={{padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Av name={emp.name} size={30}/>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{emp.name}</div>
                          <div style={{fontSize:9,color:GR2,fontFamily:"DM Mono"}}>{f$(emp.rate)}/day</div>
                          {ab>0&&<div style={{fontSize:8,color:AM,fontWeight:600}}>Adv {f$(ab)}</div>}
                        </div>
                      </div>
                    </div>
                    {wkDays.map((d,di)=>{
                      const iso=toISO(d),log=getLog(emp.id,iso),on=!!log,isHalf=log?.days===0.5,isT=iso===TODAY;
                      return <div key={di} style={{display:"flex",justifyContent:"center",alignItems:"center",padding:"8px 2px",borderLeft:`1px solid ${BD}`}}>
                        <div className={`dt${isHalf?" half":on?" on":""}${isT&&!on?" td":""}`} onClick={()=>toggle(emp.id,iso)} title={isHalf?"½ day — tap to clear":on?"Full day — tap for ½":"Tap to log full day"}>
                          {on&&!isHalf&&<Ic n="chk" sz={14} c="#fff" sw={2.5}/>}
                          {isHalf&&<span style={{fontSize:13,fontWeight:800,color:"#fff",lineHeight:1}}>½</span>}
                          {log?.paid&&<div style={{position:"absolute",top:-3,right:-3,width:9,height:9,borderRadius:"50%",background:GNB,border:"2px solid #fff"}}/>}
                        </div>
                      </div>;
                    })}
                    <div style={{padding:"10px 10px 10px 4px",textAlign:"right",borderLeft:`1px solid ${BD}`}}>
                      <div style={{fontWeight:700,fontSize:13,fontFamily:"DM Mono",color:days>0?R:BD}}>{f$(wp)}</div>
                      <div style={{fontSize:9,color:GR2,marginTop:1}}>{days%1===0?days:days.toFixed(1)}d</div>
                      {wo>0&&<button className="rp" onClick={()=>markPaid(emp.id)} style={{marginTop:4,background:GN2,border:`1px solid ${GNB}40`,borderRadius:6,padding:"3px 6px",fontSize:9,color:GN,fontWeight:700,display:"block",width:"100%"}}>Pay {f$(netOwe(emp.id))}</button>}
                      {wo===0&&days>0&&<div style={{marginTop:3}}><Pip color={GN}>✓ Paid</Pip></div>}
                    </div>
                  </div>;
                })}

                {/* Totals */}
                <div style={{display:"grid",gridTemplateColumns:GRDCOLS,background:BG2,borderTop:`2px solid ${BD}`}}>
                  <div style={{padding:"9px 12px",fontSize:9,fontWeight:700,color:GR,textTransform:"uppercase",letterSpacing:".06em"}}>Totals</div>
                  {wkDays.map((d,i)=>{const iso=toISO(d),dt=wkLogs.filter(l=>l.date===iso).reduce((s,l)=>s+rt(l.empId),0);return <div key={i} style={{padding:"9px 2px",textAlign:"center",fontSize:10,fontWeight:600,color:dt>0?DK:BD,borderLeft:`1px solid ${BD}`,fontFamily:"DM Mono"}}>{dt>0?f$(dt):"—"}</div>})}
                  <div style={{padding:"9px 10px 9px 4px",textAlign:"right",borderLeft:`1px solid ${BD}`}}>
                    <div style={{fontSize:15,fontWeight:700,color:R,fontFamily:"DM Mono"}}>{f$(wkTot)}</div>
                    {wkOwd>0&&<div style={{fontSize:9,color:AM}}>Owed {f$(wkOwd)}</div>}
                  </div>
                </div>
              </div>
            </div>

            {wkLogs.length>0&&<div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
              <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
                <Kpi label="Week Total" value={f$(wkTot)}/>
                <Kpi label="Outstanding" value={f$(wkOwd)} color={wkOwd>0?R:GN}/>
                <Kpi label="Days" value={wkLogs.reduce((s,l)=>s+(l.days||1),0)}/>
              </div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {wkOwd>0&&<PB col={GN} onClick={markAll} style={{background:`linear-gradient(135deg,${GN},${GN})`,padding:"10px 14px",fontSize:13}}><Ic n="chk" sz={13} c="#fff"/>Mark All Paid</PB>}
                <PB col={AM} onClick={()=>setModal("addAdv")} style={{background:`linear-gradient(135deg,${AM},#B45309)`,padding:"10px 14px",fontSize:13}}><Ic n="dlr" sz={13} c="#fff"/>Advance</PB>
              </div>
            </div>}
          </>
        }
      </div>}

      {/* ═══ CALENDAR ══════════════════════════════════════════════ */}
      {tab==="cal"&&<div className="fi" style={{padding:PAD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:8}}>
          <div>
            <div style={{fontSize:9,fontWeight:600,color:GR2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:3}}>Calendar</div>
            <h1 style={{fontSize:17,fontWeight:800}}>{MFULL[calM]} {calY}</h1>
          </div>
          <div style={{display:"flex",gap:5}}>
            <button className="rp" onClick={()=>{if(calM===0){setCalM(11);setCalY(y=>y-1)}else setCalM(m=>m-1)}} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:GR}}><Ic n="chL" sz={13}/></button>
            <button className="rp" onClick={()=>{const t=new Date();setCalM(t.getMonth());setCalY(t.getFullYear());setCalSel(null)}} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,padding:"0 10px",height:30,fontSize:11,fontWeight:600,color:R}}>Today</button>
            <button className="rp" onClick={()=>{if(calM===11){setCalM(0);setCalY(y=>y+1)}else setCalM(m=>m+1)}} style={{background:WH,border:`1.5px solid ${BD}`,borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",color:GR}}><Ic n="chR" sz={13}/></button>
          </div>
        </div>

        {/* Month stats */}
        {(()=>{const ms=mthStats();return <div style={{background:WH,borderRadius:11,border:`1px solid ${BD}`,padding:"10px 14px",marginBottom:12,display:"flex",gap:16,flexWrap:"wrap"}}>
          {[{l:"Days",v:ms.days},{l:"Total",v:f$(ms.tot)},{l:"Paid",v:f$(ms.paid),c:GN},{l:"Owed",v:f$(ms.owed),c:ms.owed>0?R:GN}].map(s=><div key={s.l}><div style={{fontSize:9,color:GR2,textTransform:"uppercase",letterSpacing:".07em",fontWeight:600}}>{s.l}</div><div style={{fontFamily:"DM Mono",fontWeight:600,fontSize:14,color:s.c||DK,marginTop:1}}>{s.v}</div></div>)}
        </div>})()}

        {/* Full width calendar */}
        <div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,overflow:"hidden",marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:BG2,borderBottom:`1px solid ${BD}`}}>
            {CDAYS.map((d,i)=><div key={i} style={{padding:"9px 2px",textAlign:"center",fontSize:10,fontWeight:700,color:GR2,textTransform:"uppercase"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
            {buildCal().map((day,idx)=>{
              if(day===null)return <div key={`b${idx}`} className="cb" style={{minHeight:76,background:BG2,borderRight:`1px solid ${BD}`,borderBottom:`1px solid ${BD}`}}/>;
              const iso=isoDay(day),dl=calLogs(iso),isT=iso===TODAY,isSel=iso===calSel;
              const allPaid=dl.length>0&&dl.every(l=>l.paid),hasOwed=dl.some(l=>!l.paid);
              return <div key={day} className="cc" onClick={()=>setCalSel(iso===calSel?null:iso)} style={{minHeight:76,padding:"6px 7px",position:"relative",borderRight:`1px solid ${BD}`,borderBottom:`1px solid ${BD}`,background:isSel?"#FFF0F0":isT?"#FFFBF0":WH,boxShadow:isSel?`inset 0 0 0 2px ${R}`:isT?`inset 0 0 0 2px ${AMB}`:"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <div style={{width:21,height:21,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:isT?800:500,background:isT?R:"transparent",color:isT?"#fff":isSel?R:DK}}>{day}</div>
                  {allPaid&&<div style={{width:6,height:6,borderRadius:"50%",background:GNB}}/>}
                  {hasOwed&&<div style={{width:6,height:6,borderRadius:"50%",background:R,opacity:.55}}/>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {dl.slice(0,2).map(l=>{const e=emps.find(x=>x.id===l.empId);return e?<div key={l.id} style={{fontSize:8,fontWeight:600,padding:"1px 4px",borderRadius:3,background:l.paid?GN2:"#FDEAEA",color:l.paid?GN:R,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name.split(" ")[0]}</div>:null})}
                  {dl.length>2&&<div style={{fontSize:7,color:GR2}}>+{dl.length-2}</div>}
                </div>
              </div>;
            })}
          </div>
        </div>

        {/* Day detail below */}
        {calSel
          ?<div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",background:`linear-gradient(135deg,${R},${R2})`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{fD(calSel)}</div>
                {(()=>{const dl=calLogs(calSel),tot=dl.reduce((s,l)=>s+(l.days||1)*rt(l.empId),0);return <div style={{fontSize:11,color:"rgba(255,255,255,.65)",marginTop:1}}>{dl.length} worker{dl.length!==1?"s":""} · {f$(tot)}</div>})()}
              </div>
              <button className="rp" onClick={()=>setCalSel(null)} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:7,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="x" sz={13} c="#fff"/></button>
            </div>
            {calLogs(calSel).length===0
              ?<div style={{padding:24,textAlign:"center",color:GR2,fontSize:13}}>No work logged this day.</div>
              :<div style={{padding:12,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:9}}>
                {calLogs(calSel).map(l=>{const e=emps.find(x=>x.id===l.empId);return <div key={l.id} style={{background:BG,borderRadius:9,border:`1px solid ${BD}`,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                  <Av name={e?.name||"?"} size={32}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{e?.name||"?"}</div>
                    <div style={{fontSize:10,color:GR2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.job}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                      <div style={{fontFamily:"DM Mono",fontWeight:600,fontSize:12,color:R}}>{e?f$(e.rate):"—"}</div>
                      <Pip color={l.paid?GN:R}>{l.paid?"Paid":"Owed"}</Pip>
                    </div>
                  </div>
                </div>})}
              </div>
            }
          </div>
          :<div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,padding:"16px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:9,background:BG,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="inf" sz={18} c={GR2}/></div>
            <div style={{fontSize:12,color:GR2,lineHeight:1.6}}>Tap any date · <span style={{color:GN,fontWeight:600}}>Green</span> = paid · <span style={{color:R,fontWeight:600}}>Red</span> = owed</div>
          </div>
        }
      </div>}

      {/* ═══ CREW ══════════════════════════════════════════════════ */}
      {tab==="crew"&&<div className="fi" style={{padding:PAD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h1 style={{fontSize:18,fontWeight:800}}>Crew Members</h1>
          <PB onClick={()=>setModal("addEmp")} style={{padding:"9px 14px",fontSize:13}}><Ic n="pls" sz={13} c="#fff"/>Add</PB>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {emps.map(emp=>{
            const st=empSt(emp),ea=advs.filter(a=>a.empId===emp.id);
            return <div key={emp.id} style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",padding:"14px 16px",gap:12,flexWrap:"wrap"}}>
                <Av name={emp.name} size={42}/>
                <div style={{flex:1,minWidth:110}}>
                  <div style={{fontWeight:700,fontSize:15}}>{emp.name}</div>
                  <div style={{fontSize:11,color:GR2}}>{emp.role||"Employee"} · <span style={{fontFamily:"DM Mono"}}>{f$(emp.rate)}/day</span></div>
                </div>
                <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                  {[{l:"Days",v:st.days},{l:"Earned",v:f$(st.earned)},{l:"Paid",v:f$(st.paid),c:GN},{l:"Owed",v:f$(st.owed),c:st.owed>0?R:GN},...(st.adv>0?[{l:"Adv",v:f$(st.adv),c:AM}]:[])].map(s=><div key={s.l}><div style={{fontSize:8,fontWeight:600,color:GR2,textTransform:"uppercase",letterSpacing:".07em",marginBottom:1}}>{s.l}</div><div style={{fontFamily:"DM Mono",fontSize:13,fontWeight:500,color:s.c||DK}}>{s.v}</div></div>)}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <GB onClick={()=>{setFEdit({...emp});setModal("editEmp")}} style={{padding:"6px 12px",fontSize:12}}>Edit</GB>
                  <button className="rp" onClick={()=>delEmp(emp.id)} style={{background:"none",border:`1.5px solid #EECECE`,borderRadius:9,padding:"6px 9px",color:"#B03030",display:"flex",alignItems:"center"}}><Ic n="x" sz={13} c="#B03030"/></button>
                </div>
              </div>
              {ea.length>0&&<div style={{borderTop:`1px solid ${BD}`,padding:"8px 16px",background:BG}}>
                <div style={{fontSize:8,fontWeight:700,color:GR2,textTransform:"uppercase",letterSpacing:".08em",marginBottom:5}}>Advances</div>
                {ea.map(a=><div key={a.id} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,marginBottom:4}}>
                  <div style={{flex:1,color:GR}}>{fD(a.date)}{a.note?` · ${a.note}`:""}</div>
                  <div style={{fontFamily:"DM Mono",fontWeight:500,color:AM}}>{f$(a.amount)}</div>
                  {a.settled?<Pip color={GN}>Settled</Pip>:<button className="rp" onClick={()=>setAdvs(p=>p.map(x=>x.id===a.id?{...x,settled:true}:x))} style={{background:"none",border:`1px solid ${GNB}`,borderRadius:5,padding:"2px 7px",fontSize:9,color:GN,fontWeight:700}}>Settle</button>}
                </div>)}
              </div>}
            </div>;
          })}
          {emps.length===0&&<div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,padding:36,textAlign:"center",color:GR2}}>No employees yet.</div>}
        </div>
      </div>}

      {/* ═══ JOBS ══════════════════════════════════════════════════ */}
      {tab==="jobs"&&<div className="fi" style={{padding:PAD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h1 style={{fontSize:18,fontWeight:800}}>Jobs & Projects</h1>
          <PB onClick={()=>setModal("addJob")} style={{padding:"9px 14px",fontSize:13}}><Ic n="pls" sz={13} c="#fff"/>New</PB>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:11}}>
          {jobSt.map(job=><div key={job.name} style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,overflow:"hidden"}}>
            <div style={{background:`linear-gradient(135deg,${R},${R2})`,padding:"14px 16px"}}>
              <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{job.name}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.65)",marginTop:1}}>{job.days} day{job.days!==1?"s":""}</div>
            </div>
            <div style={{padding:"12px 16px"}}>
              {[{l:"Total",v:f$(job.cost)},{l:"Paid",v:f$(job.paid),c:GN},{l:"Owed",v:f$(job.owed),c:job.owed>0?R:GN}].map(s=><div key={s.l} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,color:GR2}}>{s.l}</span><span style={{fontWeight:700,fontSize:12,fontFamily:"DM Mono",color:s.c||DK}}>{s.v}</span></div>)}
              <div style={{height:1,background:BD,margin:"6px 0 8px"}}/>
              {emps.map(emp=>{const ed=logs.filter(l=>l.empId===emp.id&&l.job===job.name).length;if(!ed)return null;return <div key={emp.id} style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}><span style={{fontSize:10,color:GR,display:"flex",alignItems:"center",gap:4}}><Av name={emp.name} size={13}/>{emp.name}</span><span style={{fontSize:10,fontFamily:"DM Mono",fontWeight:500}}>{ed}d · {f$(ed*emp.rate)}</span></div>})}
              <button className="rp" onClick={()=>delJob(job.name)} style={{marginTop:6,background:"none",border:"none",color:"#C03030",fontSize:10,padding:0,display:"flex",alignItems:"center",gap:2}}><Ic n="x" sz={10} c="#C03030"/>Remove</button>
            </div>
          </div>)}
          {jobs.length===0&&<div style={{background:WH,borderRadius:13,border:`1px solid ${BD}`,padding:30,textAlign:"center",color:GR2,gridColumn:"1/-1"}}>No jobs yet.</div>}
        </div>
      </div>}

    </div>{/* end scroll */}

    {/* BOTTOM TAB BAR */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:DK,borderTop:`1px solid ${DK3}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100}}>
      {NAV.map(n=><button key={n.k} className="rp" onClick={()=>setTab(n.k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"10px 4px 8px",border:"none",background:"transparent",color:tab===n.k?"#fff":"rgba(255,255,255,.38)"}}>
        <Ic n={n.i} sz={21} c={tab===n.k?"#fff":"rgba(255,255,255,.38)"}/>
        <span style={{fontSize:9,fontWeight:tab===n.k?700:400,letterSpacing:".02em"}}>{n.l}</span>
        {tab===n.k&&<div style={{width:4,height:4,borderRadius:"50%",background:R,marginTop:1}}/>}
      </button>)}
      <button className="rp" onClick={()=>setModal("addAdv")} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"10px 4px 8px",border:"none",background:"transparent",color:"rgba(255,255,255,.38)"}}>
        <Ic n="dlr" sz={21} c="rgba(255,255,255,.38)"/>
        <span style={{fontSize:9,fontWeight:400,letterSpacing:".02em"}}>Advance</span>
      </button>
    </div>

    {/* MODALS */}
    {modal==="addEmp"&&<Modal title="Add Crew Member" onClose={()=>setModal(null)}>
      <Inp label="Full Name" placeholder="e.g. Carlos M." value={fEmp.name} onChange={e=>setFEmp(p=>({...p,name:e.target.value}))} autoCapitalize="words"/>
      <Inp label="Role / Trade" placeholder="e.g. Painter, Carpenter" value={fEmp.role} onChange={e=>setFEmp(p=>({...p,role:e.target.value}))} autoCapitalize="words"/>
      <Inp label="Daily Rate ($)" type="number" inputMode="decimal" placeholder="200" value={fEmp.rate} onChange={e=>setFEmp(p=>({...p,rate:e.target.value}))}/>
      <div style={{display:"flex",gap:9,justifyContent:"flex-end",marginTop:4}}><GB onClick={()=>setModal(null)}>Cancel</GB><PB onClick={addEmp}>Add to Crew</PB></div>
    </Modal>}

    {modal==="editEmp"&&fEdit&&<Modal title="Edit Employee" onClose={()=>setModal(null)}>
      <Inp label="Full Name" value={fEdit.name} onChange={e=>setFEdit(p=>({...p,name:e.target.value}))} autoCapitalize="words"/>
      <Inp label="Role / Trade" value={fEdit.role} onChange={e=>setFEdit(p=>({...p,role:e.target.value}))} autoCapitalize="words"/>
      <Inp label="Daily Rate ($)" type="number" inputMode="decimal" value={fEdit.rate} onChange={e=>setFEdit(p=>({...p,rate:e.target.value}))}/>
      <div style={{display:"flex",gap:9,justifyContent:"flex-end",marginTop:4}}><GB onClick={()=>setModal(null)}>Cancel</GB><PB onClick={saveEmp}>Save</PB></div>
    </Modal>}

    {modal==="addJob"&&<Modal title="New Job / Project" sub="Add a job site to assign work days to" onClose={()=>setModal(null)}>
      <Inp label="Job Name" placeholder="e.g. Bronxville Exterior" value={fJob} onChange={e=>setFJob(e.target.value)} autoCapitalize="words"/>
      <div style={{display:"flex",gap:9,justifyContent:"flex-end",marginTop:4}}><GB onClick={()=>setModal(null)}>Cancel</GB><PB onClick={addJob}>Add Job</PB></div>
    </Modal>}

    {modal==="addAdv"&&<Modal title="Record Advance Pay" sub="Auto-deducted when marking employee paid" onClose={()=>setModal(null)}>
      <Sel label="Employee" value={fAdv.empId} onChange={e=>setFAdv(p=>({...p,empId:e.target.value}))}>
        <option value="">Select employee…</option>
        {emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
      </Sel>
      <Inp label="Amount ($)" type="number" inputMode="decimal" placeholder="150" value={fAdv.amount} onChange={e=>setFAdv(p=>({...p,amount:e.target.value}))}/>
      <Inp label="Date" type="date" value={fAdv.date} onChange={e=>setFAdv(p=>({...p,date:e.target.value}))}/>
      <Inp label="Note (optional)" placeholder="e.g. Cash for gas" value={fAdv.note} onChange={e=>setFAdv(p=>({...p,note:e.target.value}))}/>
      <div style={{background:AM2,borderRadius:9,padding:"9px 12px",marginBottom:12,fontSize:12,color:AM,display:"flex",gap:7,alignItems:"flex-start"}}>
        <Ic n="inf" sz={13} c={AM}/><span>Deducted automatically when you mark this employee paid.</span>
      </div>
      <div style={{display:"flex",gap:9,justifyContent:"flex-end"}}><GB onClick={()=>setModal(null)}>Cancel</GB><PB col={AM} onClick={addAdv} style={{background:`linear-gradient(135deg,${AM},#B45309)`}}>Record Advance</PB></div>
    </Modal>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
